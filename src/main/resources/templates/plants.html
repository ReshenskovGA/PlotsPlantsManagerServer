<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список растений</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>Список растений</h1>
        <a th:href="@{/web/plants/add}" class="btn btn-primary">+ Добавить личное растение</a>
    </div>

    <!-- Форма поиска и фильтров -->
    <form th:action="@{/web/plants}" method="get" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem; background: #f9f9f9; padding: 1rem; border-radius: 8px;">
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <input type="text" name="search" th:value="${search}" placeholder="Поиск по названию..." style="flex: 2; min-width: 200px; padding: 0.5rem;">
            <select name="source" style="flex: 1; min-width: 150px; padding: 0.5rem;">
                <option value="all" th:selected="${source == null || source == 'all'}">Все источники</option>
                <option value="catalog" th:selected="${source == 'catalog'}">Справочник</option>
                <option value="personal" th:selected="${source == 'personal'}">Личные</option>
            </select>
            <button type="submit" class="btn btn-primary">Найти</button>
            <a th:href="@{/web/plants}" class="btn" style="background: #eee;">Сбросить</a>
        </div>
        <div>
            <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">Фильтр по категориям:</label>
            <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                <div th:each="cat : ${allCategories}">
                    <label style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.9rem; cursor: pointer;">
                        <input type="checkbox" name="categories" th:value="${cat}"
                               th:checked="${selectedCategories != null and selectedCategories.contains(cat)}">
                        <span th:text="${cat}">Категория</span>
                    </label>
                </div>
            </div>
        </div>
    </form>

    <!-- Таблица растений -->
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
            <thead>
            <tr style="background: #f5f5f5;">
                <th style="padding: 1rem; text-align: left; width: 80px;">Фото</th>
                <th style="padding: 1rem; text-align: left;">Источник</th>
                <th style="padding: 1rem; text-align: left;">Название</th>
                <th style="padding: 1rem; text-align: left;">Категории</th>
                <th style="padding: 1rem; text-align: left;">Описание</th>
                <th style="padding: 1rem; text-align: center;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plant : ${plants}" style="border-bottom: 1px solid #eee;">
                <td style="padding: 1rem; text-align: center;">
                    <img th:if="${plant.photosUri != null and !plant.photosUri.isEmpty()}"
                         th:src="@{/uploads/{file}(file=${plant.photosUri[0]})}"
                         style="width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid #eee;">
                    <span th:unless="${plant.photosUri != null and !plant.photosUri.isEmpty()}" style="color: #ccc; font-size: 2rem;">&#127793;</span>
                </td>
                <td style="padding: 1rem;">
            <span th:text="${plant.catalog} ? 'Справочник' : 'Личное'"
                  th:style="${plant.catalog} ? 'background: #e3f2fd; color: #1565c0; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; white-space: nowrap;' : 'background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; white-space: nowrap;'">
                Источник
            </span>
                </td>
                <!-- Остальные ячейки (Название, Категории, Описание, Действия) остаются без изменений -->
                <td style="padding: 1rem; font-weight: bold;" th:text="${plant.name}">Название</td>
                <td style="padding: 1rem;">
            <span th:each="cat : ${plant.categories}" th:text="${cat}"
                  style="background: #f3e5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; margin-right: 4px; display: inline-block; margin-bottom: 2px;"></span>
                    <span th:if="${plant.categories == null || plant.categories.isEmpty()}" style="color: #999;">-</span>
                </td>
                <td style="padding: 1rem; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${plant.description} ?: '-'">Описание</td>
                <td style="padding: 1rem; text-align: center; white-space: nowrap;">
                    <a th:href="@{/web/plants/view/{id}(id=${plant.id}, source=${plant.catalog} ? 'catalog' : 'personal')}"
                       class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.9rem; background: #e3f2fd; color: #1565c0;">Просмотр</a>
                    <th:block th:if="${!plant.catalog}">
                        <a th:href="@{/web/plants/edit/{id}(id=${plant.id})}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.9rem;">Изменить</a>
                        <form th:action="@{/web/plants/delete/{id}(id=${plant.id})}" method="post" style="display: inline;" onsubmit="return confirm('Удалить растение?');">
                            <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.9rem; background: #ffebee; color: #c62828;">Удалить</button>
                        </form>
                    </th:block>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(plants)}">
                <td colspan="5" style="text-align: center; padding: 2rem; color: #777;">Растения не найдены</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
