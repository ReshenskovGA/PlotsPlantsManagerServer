<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задачи на дату</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="padding: 2rem;">
    <a th:href="@{/web/tasks/calendar}" class="btn" style="background: #eee; margin-bottom: 1.5rem; display: inline-block;">&larr; Назад к календарю</a>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
        <h1 style="margin: 0;">Задачи на <span th:text="${formattedDate}">дату</span></h1>
        <a th:href="@{/web/tasks/add}" class="btn btn-primary">+ Добавить задачу</a>
    </div>
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
        <tr style="background: #f5f5f5;">
            <th style="padding: 1rem; text-align: left;">Статус</th>
            <th style="padding: 1rem; text-align: left;">Название</th>
            <th style="padding: 1rem; text-align: left;">Объект</th>
            <th style="padding: 1rem; text-align: left;">Категория</th>
            <th style="padding: 1rem; text-align: left;">Повторение</th>
            <th style="padding: 1rem; text-align: center;">Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}"
            th:attr="data-task-date=${task.date}, data-task-completed=${task.isCompleted}"
            style="border-bottom: 1px solid #eee; border-left: 4px solid transparent;">
            <td style="padding: 1rem;" th:text="${task.isCompleted} ? 'Выполнено' : 'В работе'">Статус</td>
            <td style="padding: 1rem; font-weight: bold;" th:text="${task.title}">Название</td>
            <td style="padding: 1rem;" th:text="${task.plantedItemId != null ? plantedItemNames[task.plantedItemType + '_' + task.plantedItemId] : '-'}">Объект</td>
            <td style="padding: 1rem;" th:text="${task.categoryName} ?: '-'">Категория</td>
            <td style="padding: 1rem;">
                <span th:if="${task.id < 0}" style="background: #fff3e0; color: #e65100; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem;">Цикличная</span>
            </td>
            <td style="padding: 1rem; text-align: center; white-space: nowrap;">
                <a th:href="@{/web/tasks/view/{id}(id=${task.id})}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.85rem; background: #e3f2fd; color: #1565c0;">Просмотр</a>
                <form th:action="@{/web/tasks/toggle}" method="post" style="display: inline;">
                    <input type="hidden" name="id" th:value="${task.id}">
                    <input type="hidden" name="date" th:value="${task.date}">
                    <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.85rem; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7;"
                            th:text="${task.isCompleted} ? 'Отменить' : 'Выполнить'">Переключить</button>
                </form>
                <form th:action="@{/web/tasks/delete/{id}(id=${task.id > 0 ? task.id : T(java.lang.Math).abs(task.id) / 10000})}" method="post" style="display: inline;" onsubmit="return confirm('Удалить задачу? Для цикличной задачи это удалит всю серию.');">
                    <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.85rem; background: #ffebee; color: #c62828;">Удалить</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(tasks)}">
            <td colspan="6" style="text-align: center; padding: 2rem; color: #777;">На этот день задач нет.</td>
        </tr>
        </tbody>
    </table>
</main>
<div th:replace="~{layout :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);

        document.querySelectorAll('tr[data-task-date]').forEach(function(row) {
            var timestamp = parseInt(row.getAttribute('data-task-date'));
            if (isNaN(timestamp)) return;

            var taskDate = new Date(timestamp);
            taskDate.setHours(0, 0, 0, 0);
            var isCompleted = row.getAttribute('data-task-completed') === 'true';

            if (isCompleted) {
                row.style.borderLeftColor = '#9e9e9e';
                return;
            }

            if (taskDate.getTime() < today.getTime()) {
                row.style.backgroundColor = '#ffebee';
                row.style.borderLeftColor = '#c62828';
            } else if (taskDate.getTime() < tomorrow.getTime()) {
                row.style.backgroundColor = '#fffde7';
                row.style.borderLeftColor = '#f9a825';
            } else {
                row.style.backgroundColor = '#e3f2fd';
                row.style.borderLeftColor = '#1565c0';
            }
        });
    });
</script>
</body>
</html>
