<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-wrapper">
<div class="form-container login-box">
    <h2 style="text-align: center;">Регистрация</h2>
    <form th:action="@{/web/register}" method="post" th:object="${user}">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" th:field="*{username}" required>
        </div>
        <div class="form-group">
            <label for="login">Логин</label>
            <input type="text" id="login" th:field="*{login}" required minlength="3" maxlength="50">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" th:field="*{password}" required minlength="5">
        </div>

        <p th:if="${error}" th:text="${error}" style="color: red; text-align: center; margin-bottom: 1rem;"></p>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>
    <p style="text-align: center; margin-top: 1rem;">
        Уже есть аккаунт? <a th:href="@{/web/login}" style="color: #2e7d32; text-decoration: underline;">Войти</a>
    </p>
</div>
</body>
</html>
