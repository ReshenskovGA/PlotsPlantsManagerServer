<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Участок</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="max-width: 600px; margin: 2rem auto; padding: 2rem; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h2 th:text="${plot.id != null} ? 'Редактировать участок' : 'Новый участок'">Форма</h2>
    <form th:action="@{/web/plots/save}" method="post" enctype="multipart/form-data" th:object="${plot}">
        <input type="hidden" th:field="*{id}">

        <div style="margin-bottom: 1rem;">
            <label>Название *</label>
            <input type="text" th:field="*{name}" required style="width: 100%; padding: 0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Адрес</label>
            <input type="text" th:field="*{address}" style="width: 100%; padding: 0.5rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label>Кадастровый номер</label>
            <input type="text" th:field="*{cadastralNumber}" style="width: 100%; padding: 0.5rem;">
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
                <label>Длина (м) *</label>
                <input type="number" step="0.1" th:field="*{length}" required style="width: 100%; padding: 0.5rem;">
            </div>
            <div style="flex: 1;">
                <label>Ширина (м) *</label>
                <input type="number" step="0.1" th:field="*{width}" required style="width: 100%; padding: 0.5rem;">
            </div>
        </div>

        <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">Фотографии участка</label>

        <!-- Существующие фотографии с возможностью удаления -->
        <div th:if="${plot.photosUri != null and !plot.photosUri.isEmpty()}" style="display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem;">
            <div th:each="photo : ${plot.photosUri}" style="position: relative; border: 1px solid #ddd; padding: 0.5rem; border-radius: 4px; background: #fafafa;">
                <img th:src="@{/uploads/{file}(file=${photo})}" style="width: 100px; height: 100px; object-fit: cover; display: block; margin-bottom: 0.5rem; border-radius: 4px;">
                <label style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" name="keptPhotos" th:value="${photo}" checked style="width: auto; margin: 0;">
                    Оставить
                </label>
            </div>
        </div>

        <!-- Загрузка новых -->
        <input type="file" name="photos" multiple accept="image/*" style="width: 100%; padding: 0.5rem; border: 1px dashed #ccc; border-radius: 4px;">
        <small style="color: #666; display: block; margin-top: 0.25rem;">Снимите галочку с существующего фото, чтобы удалить его. Новые фото добавятся к оставленным.</small>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">Фото плана участка</label>

            <!-- Существующий план -->
            <div th:if="${plot.planPhotoUri != null and !plot.planPhotoUri.isEmpty()}" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: 0.5rem; background: #fafafa; border-radius: 4px; border: 1px solid #ddd;">
                <img th:src="@{/uploads/{file}(file=${plot.planPhotoUri})}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
                <div>
                    <div style="font-size: 0.9rem; margin-bottom: 0.25rem;">Текущий план</div>
                    <label style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; cursor: pointer; color: #c62828;">
                        <input type="checkbox" name="removePlanPhoto" value="true" style="width: auto; margin: 0;">
                        Удалить план
                    </label>
                </div>
            </div>

            <!-- Загрузка нового плана -->
            <input type="file" name="planPhoto" accept="image/*" style="width: 100%; padding: 0.5rem; border: 1px dashed #ccc; border-radius: 4px;">
            <small style="color: #666; display: block; margin-top: 0.25rem;">Загрузка нового файла заменит текущий план (если он не был удален).</small>
        </div>

        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Сохранить</button>
            <a th:href="@{/web/plots}" class="btn" style="flex: 1; text-align: center; background: #eee;">Отмена</a>
        </div>
    </form>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
