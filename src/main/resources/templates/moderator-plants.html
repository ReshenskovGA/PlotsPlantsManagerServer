<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Справочник растений (Модератор)</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>Справочник растений</h1>
        <div style="display: flex; gap: 1rem;">
            <a th:href="@{/web/moderator/users}" class="btn">Статистика пользователей</a>
            <a th:href="@{/web/moderator/plants/add}" class="btn btn-primary">+ Добавить растение</a>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
            <thead>
            <tr style="background: #f5f5f5;">
                <th style="padding: 1rem; text-align: left;">Название</th>
                <th style="padding: 1rem; text-align: left;">Категории</th>
                <th style="padding: 1rem; text-align: left;">Описание</th>
                <th style="padding: 1rem; text-align: center;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="plant : ${plants}" style="border-bottom: 1px solid #eee;">
                <td style="padding: 1rem; font-weight: bold;" th:text="${plant.name}">Название</td>
                <td style="padding: 1rem;">
                    <span th:each="cat : ${plant.categories}" th:text="${cat}" style="background: #f3e5f5; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; margin-right: 4px;"></span>
                </td>
                <td style="padding: 1rem; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:text="${plant.description} ?: '-'">Описание</td>
                <td style="padding: 1rem; text-align: center; white-space: nowrap;">
                    <a th:href="@{/web/moderator/plants/edit/{id}(id=${plant.id})}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.9rem;">Изменить</a>
                    <form th:action="@{/web/moderator/plants/delete/{id}(id=${plant.id})}" method="post" style="display: inline;" onsubmit="return confirm('Удалить растение из справочника?');">
                        <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.9rem; background: #ffebee; color: #c62828;">Удалить</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(plants)}">
                <td colspan="4" style="text-align: center; padding: 2rem; color: #777;">Справочник пуст</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
