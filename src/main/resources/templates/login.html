<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход в систему</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-wrapper">
<div class="form-container login-box">
  <h2 style="text-align: center;">Вход в систему</h2>
  <!-- action автоматически добавит context-path /gardenhelper -->
  <form th:action="@{/web/login}" method="post">
    <div class="form-group">
      <label for="login">Логин</label>
      <input type="text" id="login" name="login" required>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" required>
    </div>

    <div class="form-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 1rem;">
      <input type="checkbox" id="remember-me" name="remember-me" style="width: auto; margin: 0;">
      <label for="remember-me" style="margin: 0; font-weight: normal; font-size: 0.95rem; cursor: pointer;">
        Запомнить меня
      </label>
    </div>

    <p th:if="${error}" th:text="${error}" style="color: red; text-align: center; margin-bottom: 1rem;"></p>
    <p th:if="${message}" th:text="${message}" style="color: green; text-align: center; margin-bottom: 1rem;"></p>

    <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
  </form>
  <p style="text-align: center; margin-top: 1rem;">
    Нет аккаунта? Обратитесь к администратору или используйте API для регистрации.
  </p>
</div>
</body>
</html>
