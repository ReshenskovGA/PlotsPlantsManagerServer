<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Объекты сада</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="padding: 2rem;">
    <h1>Грядки, деревья и кусты</h1>
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 800px;">
            <thead>
            <tr style="background: #f5f5f5;">
                <th style="padding: 1rem; text-align: left; width: 40px;">Цвет</th>
                <th style="padding: 1rem; text-align: left;">Тип объекта</th>
                <th style="padding: 1rem; text-align: left;">Участок</th>
                <th style="padding: 1rem; text-align: left;">Растение</th>
                <th style="padding: 1rem; text-align: left;">Параметры</th>
                <th style="padding: 1rem; text-align: center;">Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}" style="border-bottom: 1px solid #eee;">
                <td style="padding: 1rem;">
                    <span th:attr="style='display:inline-block; width:22px; height:22px; border-radius:' + ${item.type == 'Грядка' ? '4px' : '50%'} + '; border:1px solid #ccc; background-color:' + ${item.colorHex}"></span>
                </td>
                <td style="padding: 1rem;">
                    <span th:text="${item.type}"
                          th:style="${item.type == 'Грядка'} ? 'background: #e8f5e9; padding: 4px 8px; border-radius: 4px;' : 'background: #fff3e0; padding: 4px 8px; border-radius: 4px;'">Тип</span>
                </td>
                <td style="padding: 1rem;" th:text="${item.plotName}">Участок</td>
                <td style="padding: 1rem; font-weight: bold;" th:text="${item.plantName}">Растение</td>
                <td style="padding: 1rem;" th:text="${item.params}">Параметры</td>
                <td style="padding: 1rem; text-align: center; white-space: nowrap;">
                    <a th:if="${item.type == 'Грядка'}"
                       th:href="@{/web/items/bed/view/{id}(id=${item.id}, from='list')}"
                       class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">Просмотр</a>
                    <a th:if="${item.type == 'Дерево/Куст'}"
                       th:href="@{/web/items/treebush/view/{id}(id=${item.id}, from='list')}"
                       class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.85rem;">Просмотр</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(items)}">
                <td colspan="6" style="text-align: center; padding: 2rem; color: #777;">
                    Объекты сада отсутствуют. Добавьте участки и объекты через мобильное приложение.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
