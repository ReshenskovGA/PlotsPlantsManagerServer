<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Статистика пользователей</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{layout :: header}"></div>
<main style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>Статистика пользователей</h1>
        <a th:href="@{/web/moderator/plants}" class="btn btn-primary">Управление справочником растений</a>
    </div>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; min-width: 1000px;">
            <thead>
            <tr style="background: #f5f5f5;">
                <th style="padding: 1rem; text-align: left;">Имя</th>
                <th style="padding: 1rem; text-align: left;">Логин</th>
                <th style="padding: 1rem; text-align: left;">Пароль (хэш)</th>
                <th style="padding: 1rem; text-align: left;">Почта</th>
                <th style="padding: 1rem; text-align: left;">Роль</th>
                <th style="padding: 1rem; text-align: center;">Растения</th>
                <th style="padding: 1rem; text-align: center;">Участки</th>
                <th style="padding: 1rem; text-align: center;">Грядки/Деревья</th>
                <th style="padding: 1rem; text-align: center;">Задачи</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${usersStats}" style="border-bottom: 1px solid #eee;">
                <td style="padding: 1rem;" th:text="${user.username}">Имя</td>
                <td style="padding: 1rem; font-weight: bold;" th:text="${user.login}">Логин</td>
                <td style="padding: 1rem; font-family: monospace; font-size: 0.8rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" th:title="${user.passwordHash}" th:text="${user.passwordHash}">Хэш</td>
                <td style="padding: 1rem;" th:text="${user.email} ?: '-'">Почта</td>
                <td style="padding: 1rem;">
                    <span th:text="${user.role}" th:style="${user.role == 'MODERATOR'} ? 'background: #ffebee; color: #c62828; padding: 4px 8px; border-radius: 4px;' : 'background: #e8f5e9; color: #2e7d32; padding: 4px 8px; border-radius: 4px;'"></span>
                </td>
                <td style="padding: 1rem; text-align: center;" th:text="${user.plantsCount}">0</td>
                <td style="padding: 1rem; text-align: center;" th:text="${user.plotsCount}">0</td>
                <td style="padding: 1rem; text-align: center;" th:text="${user.gardenItemsCount}">0</td>
                <td style="padding: 1rem; text-align: center;" th:text="${user.tasksCount}">0</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
